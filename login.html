<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="favicon.png">
    <title>Enter the Studio | Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="assets/css/style.css">
    <style>
        html,
        body {
            height: 100%;
            overflow: hidden;
        }

        .auth-wrap {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px;
            margin: 0;
        }

        .auth-card {
            background: white;
            border: 1px solid var(--border-soft);
            padding: 40px 25px;
            max-width: 420px;
            width: 100%;
            position: relative;
        }

        @media (min-width: 768px) {
            .auth-card {
                max-width: 520px;
                padding: 50px 60px;
            }
        }

        .form-control {
            border: none;
            border-bottom: 1px solid var(--border-soft);
            border-radius: 0;
            padding: 8px 0;
            margin-bottom: 15px;
            background: transparent;
            font-size: 0.95rem;
        }

        .form-control:focus {
            box-shadow: none;
            border-color: var(--accent-gold);
            background: transparent;
        }

        .form-label {
            font-size: 0.62rem;
            text-transform: uppercase;
            letter-spacing: 2.5px;
            color: var(--accent-gold);
            margin-bottom: 3px;
        }
    </style>
</head>

<body class="auth-viewport-lock">

    <!-- MAIN AUTH CONTENT -->
    <div class="auth-wrap">
        <div class="auth-card shadow-sm text-center reveal active">
            <!-- THEME/RTL TOGGLES (Inside Box) -->
            <div class="auth-nav d-flex justify-content-end gap-2 mb-2" style="margin-top: -20px; margin-right: -10px;">
                <button class="rtl-toggle-btn" style="font-size: 0.7rem; letter-spacing: 2px;">
                    <span style="font-weight:bold;">RTL</span>
                </button>
                <button id="theme-toggle" class="theme-toggle-btn"><i class="bi bi-moon-fill"></i></button>
            </div>

            <a class="site-logo auth-card-logo" href="index.html">
                <span class="logo-icon"><i class="bi bi-feather"></i></span>
                Alexandra <span class="logo-gold">Sterling</span>
            </a>

            <h2 class="h4 mb-1">Welcome <span class="text-gold">Back</span></h2>


            <form>
                <div class="text-start mb-1">
                    <label class="form-label">Email</label>
                    <input type="email" class="form-control" placeholder="julianne@email.com">
                </div>
                <div class="text-start mb-2">
                    <label class="form-label">Password</label>
                    <input type="password" class="form-control" placeholder="..........">
                </div>

                <div class="d-flex justify-content-between align-items-center mb-3">
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" id="rememberMe">
                        <label class="form-check-label small opacity-75" for="rememberMe"
                            style="font-size: 0.65rem; text-transform: uppercase; letter-spacing: 1px;">Remember
                            Me</label>
                    </div>
                    <a href="#" class="text-gold small"
                        style="font-size: 0.65rem; text-transform: uppercase; letter-spacing: 1px; text-decoration: none;">Forgot
                        Password?</a>
                </div>

                <button type="submit" class="btn-artisanal w-100 mb-4">Enter Studio</button>

                <div class="d-flex align-items-center mb-3">
                    <hr class="flex-grow-1 opacity-25">
                    <span class="mx-2 small opacity-50 text-uppercase ls-1" style="font-size: 0.55rem;">Or continue
                        with</span>
                    <hr class="flex-grow-1 opacity-25">
                </div>

                <div class="social-auth-grid mb-4">
                    <button type="button" class="btn-social">
                        <i class="bi bi-google"></i> Google
                    </button>
                    <button type="button" class="btn-social">
                        <i class="bi bi-facebook"></i> Facebook
                    </button>
                </div>

                <p class="small opacity-50 mb-0 ">No account? <a href="register.html" class="text-gold fw-bold">Sign
                        Up</a></p>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/main.js"></script>
</body>

</html>
